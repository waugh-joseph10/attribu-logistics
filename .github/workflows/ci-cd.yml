name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing GHCR image tag to deploy, for example sha-abc1234"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-placeholder-secret-key
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - name: Skip checks for existing image deployment
        if: ${{ inputs.image_tag != '' && inputs.image_tag != null }}
        run: echo "Deploying existing image tag; skipping source checks."

      - name: Check out repository
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        run: uv sync --frozen --all-groups

      - name: Ruff lint
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        run: uv run ruff check apps config

      - name: Ruff format check
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        run: uv run ruff format --check apps config

      - name: Django system check
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        run: uv run python manage.py check --no-color

      - name: Migration check
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        run: uv run python manage.py makemigrations --check --dry-run --no-color

      - name: Test suite
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        run: uv run python manage.py test apps.waitlist apps.core --no-color

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
      image_name: ${{ steps.image.outputs.image_name }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      sentry_release: ${{ steps.image.outputs.sentry_release }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image reference
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          if [[ -n "${{ inputs.image_tag || '' }}" ]]; then
            image_tag="${{ inputs.image_tag }}"
          else
            image_tag="sha-${GITHUB_SHA}"
          fi
          sentry_release="${image_tag#sha-}"

          {
            echo "image_name=${image_name}"
            echo "image_tag=${image_tag}"
            echo "image_ref=${image_name}:${image_tag}"
            echo "sentry_release=${sentry_release}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' && (inputs.image_tag == '' || inputs.image_tag == null) }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=${{ steps.image.outputs.image_tag }}
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image
        if: ${{ inputs.image_tag == '' || inputs.image_tag == null }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - quality
      - build
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_PORT:?VPS_PORT secret is required}"
          : "${VPS_SSH_KEY:?VPS_SSH_KEY secret is required}"

          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy image over SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          APP_IMAGE: ${{ needs.build.outputs.image_ref }}
          SENTRY_RELEASE: ${{ needs.build.outputs.sentry_release }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          : "${VPS_HOST:?VPS_HOST secret is required}"
          : "${VPS_USER:?VPS_USER secret is required}"
          : "${VPS_PORT:?VPS_PORT secret is required}"
          : "${VPS_APP_DIR:?VPS_APP_DIR secret is required}"
          : "${GHCR_USERNAME:?GHCR_USERNAME secret is required}"
          : "${GHCR_READ_TOKEN:?GHCR_READ_TOKEN secret is required}"
          : "${APP_IMAGE:?APP_IMAGE is required}"
          : "${SENTRY_RELEASE:?SENTRY_RELEASE is required}"
          : "${DEPLOY_SHA:?DEPLOY_SHA is required}"

          {
            printf 'set -euo pipefail\n'
            printf 'export APP_IMAGE=%q\n' "$APP_IMAGE"
            printf 'export SENTRY_RELEASE=%q\n' "$SENTRY_RELEASE"
            printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'export GHCR_READ_TOKEN=%q\n' "$GHCR_READ_TOKEN"
            printf 'export VPS_APP_DIR=%q\n' "$VPS_APP_DIR"
            printf 'export DEPLOY_SHA=%q\n' "$DEPLOY_SHA"
            # shellcheck disable=SC2016
            printf '%s\n' \
              'cd "$VPS_APP_DIR"' \
              'find .git/objects -not -writable -exec chmod u+w {} +' \
              'git fetch origin main' \
              'git checkout main' \
              'git merge --ff-only "$DEPLOY_SHA"' \
              'echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin' \
              'docker compose pull web celery_worker' \
              'docker compose up -d --no-build --remove-orphans' \
              'echo "Waiting for web container to be ready..."' \
              'for i in {1..30}; do docker compose exec -T web python -c "import sys; sys.exit(0)" 2>/dev/null && break || sleep 2; done' \
              'echo "Running database migrations..."' \
              'docker compose exec -T web python manage.py migrate --no-input' \
              'docker compose restart nginx' \
              'docker image prune -af --filter "until=24h"'
          } | ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" bash -se

      - name: Verify health endpoint
        shell: bash
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || secrets.PRODUCTION_URL }}
        run: |
          echo "Waiting for application to be fully ready..."
          sleep 5
          for attempt in {1..15}; do
            echo "Health check attempt $attempt/15"
            if curl --fail --silent --show-error "$PRODUCTION_URL/health/"; then
              echo "✓ Health check passed!"
              exit 0
            fi
            echo "  Failed, waiting 10s..."
            sleep 10
          done
          echo "✗ Health check failed after 15 attempts"
          exit 1

      - name: Show recent web logs on failure
        if: failure()
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          SENTRY_RELEASE: ${{ needs.build.outputs.sentry_release }}
        run: |
          remote_dir=$(printf "%q" "$VPS_APP_DIR")
          sentry_release=$(printf "%q" "$SENTRY_RELEASE")
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "cd $remote_dir && SENTRY_RELEASE=$sentry_release docker compose logs --tail=100 web"
